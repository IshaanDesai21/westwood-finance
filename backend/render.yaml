services:
  - type: web
    name: westwood-finance-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CORS_ORIGIN
        value: https://finance.ftcblueprint.com
      - key: ADMIN_PASSWORD
        value: /dev3432
